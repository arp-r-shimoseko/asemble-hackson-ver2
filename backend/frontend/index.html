<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Palette | 検索ページ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <a class="app-logo" href="#" aria-label="Study Palette ホーム">
          <span class="app-logo__mark">SP</span>
          <span class="app-logo__text">Study Palette</span>
        </a>

        <nav class="global-nav" aria-label="グローバルナビゲーション">
          <a class="global-nav__link global-nav__link--current" href="#">検索</a>
          <a class="global-nav__link" href="#">理解度チェック</a>
          <a class="global-nav__link" href="#">コード一覧</a>
        </nav>
      </header>

      <main class="main-content">
        <section class="hero-search" aria-labelledby="hero-title">
          <div class="hero-search__content">
            <p class="hero-search__eyebrow">Learning Support App</p>
            <h1 id="hero-title" class="hero-search__title">まずは単語を調べるところから。</h1>
            <p class="hero-search__description">
              気になる用語をすぐ検索して、あとから理解度チェックやコード一覧へつなげられる学習トップページです。
            </p>

            <form class="search-panel" id="search-form" action="#" method="get">
              <label class="search-panel__label" for="word-search">単語を検索</label>
              <div class="search-panel__controls">
                <input
                  id="word-search"
                  class="search-panel__input"
                  type="search"
                  name="q"
                  placeholder="例: async / await"
                  aria-describedby="search-helper"
                />
                <button class="search-panel__button" type="submit">検索する</button>
              </div>
              <p id="search-helper" class="search-panel__helper">
                今はダミー画面です。後で検索機能を追加しやすい構成にしています。
              </p>
            </form>
          </div>

          <aside class="hero-search__status-card" aria-label="学習状況のサマリー">
            <p class="status-card__label">今日の学習メモ</p>
            <h2 class="status-card__title">検索から学習を始めよう</h2>
            <ul class="status-card__list">
              <li>よく調べる単語を下で確認</li>
              <li>理解度チェックへ進む導線をヘッダーに配置</li>
              <li>コード一覧への移動もワンタップ</li>
            </ul>
          </aside>
        </section>

        <section class="word-history" aria-labelledby="word-history-title">
          <div class="section-heading">
            <div>
              <p class="section-heading__eyebrow">Frequently Searched</p>
              <h2 id="word-history-title" class="section-heading__title">よく調べた単語一覧</h2>
            </div>
            <p class="section-heading__note">回数によって色が変わります</p>
          </div>

          <div class="word-history__list" id="word-history-list"></div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
