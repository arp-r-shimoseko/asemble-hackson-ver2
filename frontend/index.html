<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORD RADAR | 検索ページ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <a class="app-logo" href="#" aria-label="WORD RADAR ホーム">
        <img class="app-logo__image" src="Group 1.png" alt="WORD RADAR">
      </a>

      <nav class="global-nav" aria-label="グローバルナビゲーション">
        <a class="global-nav__link global-nav__link--current" href="#">検索</a>
        <a class="global-nav__link" href="#">クイズ</a>
        <a class="global-nav__link" href="#">コード一覧</a>
      </nav>
    </header>

    <main class="main-content">
      <section class="search-stage" aria-labelledby="search-title">
        <h1 id="search-title" class="visually-hidden">単語検索ページ</h1>

        <form class="search-panel" id="search-form" action="#" method="get">
          <label class="visually-hidden" for="word-search">単語を検索</label>
          <input
            id="word-search"
            class="search-panel__input"
            type="search"
            name="q"
            placeholder=""
          >
          <button class="search-panel__button" type="submit" aria-label="検索">
            <span class="search-panel__icon"></span>
          </button>
        </form>

        <div class="content-layout">
          <section class="word-history" aria-labelledby="word-history-title">
            <div class="section-heading">
              <h2 id="word-history-title" class="visually-hidden">よく調べた単語一覧</h2>
            </div>
            <div class="word-history__list" id="word-history-list"></div>
          </section>

          <aside class="ranking-panel" aria-labelledby="ranking-title">
            <div class="ranking-panel__icon">♛</div>
            <h2 id="ranking-title" class="ranking-panel__title">ランキング</h2>
            <div class="ranking-panel__list" id="ranking-list"></div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
